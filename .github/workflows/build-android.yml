name: Build Android (SDK 35)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21 (SDK 35 için Java 21 gerekli)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK 35
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform if not exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor (web -> android)
        run: npx cap sync android

      - name: Update build.gradle for SDK 35
        run: |
          cd android
          # compileSdkVersion ve targetSdkVersion'u 35 yap
          if [ -f variables.gradle ]; then
            sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 35/' variables.gradle
            sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 35/' variables.gradle
            sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 22/' variables.gradle
            cat variables.gradle
          fi

      - name: Decode keystore from secret
        run: |
          mkdir -p android/app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          ls -la android/app/release.keystore

      - name: Build APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Build AAB (release, unsigned)
        working-directory: android
        run: ./gradlew bundleRelease --stacktrace

      - name: Sign AAB with jarsigner
        run: |
          AAB_FILE=android/app/build/outputs/bundle/release/app-release.aab
          if [ ! -f "$AAB_FILE" ]; then
            echo "AAB not found at $AAB_FILE"
            find android/app/build/outputs -name "*.aab" -type f
            exit 1
          fi
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore android/app/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "$AAB_FILE" \
            "${{ secrets.KEY_ALIAS }}"
          echo "AAB imzalandı"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
