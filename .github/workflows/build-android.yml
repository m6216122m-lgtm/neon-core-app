name: Build Android APK & AAB

on:
  workflow_dispatch:  # Elle tetikle (Actions sekmesinden "Run workflow" butonu)
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/**'

jobs:
  build:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || echo "Already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject AdMob App ID into AndroidManifest
        run: |
          # config.js dosyasından AdMob App ID'yi çek (basit grep)
          APP_ID=$(grep -oP "appId:\s*'\K[^']+" www/config.js | head -1)
          echo "Detected AdMob App ID: $APP_ID"

          # AndroidManifest.xml'e meta-data ekle (zaten yoksa)
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" $MANIFEST; then
            sed -i "s|</application>|    <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"/>\n    </application>|" $MANIFEST
            echo "AdMob App ID injected into manifest"
          else
            # Zaten varsa değerini güncelle
            sed -i "s|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"[^\"]*\"|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"|" $MANIFEST
            echo "AdMob App ID updated in manifest"
          fi

      - name: Decode keystore (if available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > android/keystore/release.jks
          echo "Keystore decoded"

      - name: Build Debug APK (test için, imzasız)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build Release AAB (Play Store için)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          # build.gradle'a signing config ekle (eğer yoksa)
          if ! grep -q "signingConfigs" app/build.gradle; then
            sed -i "/android {/a\\
              signingConfigs {\\
                  release {\\
                      storeFile file('../keystore/release.jks')\\
                      storePassword System.getenv('KEYSTORE_PASSWORD')\\
                      keyAlias System.getenv('KEY_ALIAS')\\
                      keyPassword System.getenv('KEY_PASSWORD')\\
                  }\\
              }" app/build.gradle
            sed -i "s|buildTypes {|buildTypes {\\
                  release {\\
                      signingConfig signingConfigs.release\\
                      minifyEnabled false\\
                  }|" app/build.gradle
          fi
          ./gradlew bundleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Tamamlandı 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Üretilen dosyalar:" >> $GITHUB_STEP_SUMMARY
          echo "- **Debug APK**: telefonda test için indir (Artifacts bölümünden)" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "- **Release AAB**: Google Play Store'a yükle" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ AAB üretilmedi (keystore secret'ları eksik). Sadece test APK var." >> $GITHUB_STEP_SUMMARY
          fi
