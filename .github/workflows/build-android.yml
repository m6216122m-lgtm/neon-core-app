name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || echo "Already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject AdMob App ID into AndroidManifest
        run: |
          APP_ID=$(grep -oP "appId:\s*'\K[^']+" www/config.js | head -1)
          echo "Detected AdMob App ID: $APP_ID"
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" $MANIFEST; then
            sed -i "s|</application>|    <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"/>\n    </application>|" $MANIFEST
          else
            sed -i "s|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"[^\"]*\"|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"|" $MANIFEST
          fi

      - name: Build Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
