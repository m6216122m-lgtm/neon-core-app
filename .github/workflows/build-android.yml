name: Build Android APK & AAB

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    name: Build Android Debug APK + Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || echo "Already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Target SDK to 35
        run: |
          VARIABLES_FILE="android/variables.gradle"
          if [ -f "$VARIABLES_FILE" ]; then
            sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" $VARIABLES_FILE
            sed -i "s/compileSdkVersion = .*/compileSdkVersion = 35/" $VARIABLES_FILE
            echo "✓ variables.gradle güncellendi: SDK 35"
          else
            BUILD_GRADLE="android/app/build.gradle"
            if [ -f "$BUILD_GRADLE" ]; then
              sed -i "s/targetSdk .*/targetSdk 35/" $BUILD_GRADLE
              sed -i "s/compileSdk .*/compileSdk 35/" $BUILD_GRADLE
              echo "✓ build.gradle güncellendi: SDK 35"
            fi
          fi

      - name: Inject AdMob App ID into AndroidManifest
        run: |
          APP_ID=$(grep -oP "appId:\s*'\K[^']+" www/config.js | head -1)
          echo "Detected AdMob App ID: $APP_ID"
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if ! grep -q "com.google.android.gms.ads.APPLICATION_ID" $MANIFEST; then
            sed -i "s|</application>|    <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"/>\n    </application>|" $MANIFEST
          else
            sed -i "s|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"[^\"]*\"|android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"|" $MANIFEST
          fi

      - name: Build Debug APK (test için)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠️ KEYSTORE_BASE64 secret eksik - release AAB üretilmeyecek"
            echo "RELEASE_ENABLED=false" >> $GITHUB_ENV
          else
            mkdir -p android/app
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            echo "✓ Keystore decoded to android/app/release.jks"
            ls -la android/app/release.jks
            echo "RELEASE_ENABLED=true" >> $GITHUB_ENV
          fi

      - name: Build Release AAB (Play Store için - önce imzasız üret)
        if: env.RELEASE_ENABLED == 'true'
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Sign AAB with jarsigner
        if: env.RELEASE_ENABLED == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$AAB_PATH" ]; then
            echo "❌ AAB bulunamadı: $AAB_PATH"
            ls -la android/app/build/outputs/bundle/release/ || true
            exit 1
          fi

          # Jarsigner ile imzala (AAB için geçerli yöntem)
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore android/app/release.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$AAB_PATH" \
            "$KEY_ALIAS"

          # İmzayı doğrula
          jarsigner -verify -verbose "$AAB_PATH" | tail -20
          echo "✓ AAB signed successfully"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release AAB
        if: env.RELEASE_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: neon-core-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Sonucu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "✅ **Debug APK** ($SIZE) - Artifacts'tan indir" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            SIZE=$(du -h android/app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "⭐ **Release AAB** ($SIZE) - Play Store'a yükle" >> $GITHUB_STEP_SUMMARY
          fi
